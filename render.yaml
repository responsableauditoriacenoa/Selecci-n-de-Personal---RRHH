services:
  - type: web
    name: rrhh-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    rootDir: ./backend
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: Plataforma RRHH
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: BACKEND_CORS_ORIGINS
        value: '["https://YOUR-STREAMLIT-APP.streamlit.app"]'
      - key: PUBLIC_BASE_URL
        value: https://YOUR-STREAMLIT-APP.streamlit.app
      - key: UPLOAD_DIR
        value: uploads
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: rrhh-db
          property: connectionString

  - type: pserv
    name: rrhh-db
    plan: free
    databaseName: rrhh
    user: rrhh_user
